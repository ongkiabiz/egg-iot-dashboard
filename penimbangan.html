<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penimbangan - EggScale IoT</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-egg sidebar-logo"></i>
                <h3 class="sidebar-title">EggScale</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
                <li><a href="penimbangan.html" class="active"><i class="fa-solid fa-scale-balanced"></i> Penimbangan</a></li>
                <li><a href="pengaturan.html"><i class="fa-solid fa-gear"></i> Kalibrasi Manual</a></li>
                <li><a href="index.html" class="text-danger mt-3"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <nav class="top-navbar">
                <div>
                    <button class="btn btn-light d-md-none" id="sidebarToggle">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h5 class="mb-0 ms-2 d-none d-md-inline-block text-muted">Selamat datang, Super Admin</h5>
                </div>
                <div class="navbar-user">
                    <span class="d-none d-md-block fw-semibold text-muted">Budi Santoso</span>
                    <div class="user-avatar">BS</div>
                </div>
            </nav>

            <!-- Content Area -->
            <div class="content-wrapper">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="page-title mb-0">Proses Penimbangan</h2>
                    <div>
                        <span class="badge badge-online">
                            <span class="status-indicator indicator-online"></span> TB01: Online
                        </span>
                    </div>
                </div>

                <!-- Weighing Controls -->
                <div class="card-custom mb-4 border-0 bg-transparent shadow-none">
                    <div class="d-flex justify-content-center">
                        <button class="btn btn-primary btn-lg px-5 py-3 fw-bold" style="border-radius: 50px; font-size: 1.2rem;" onclick="mulaiTimbang(this)">
                            <i class="fa-solid fa-play me-2"></i> Mulai Timbang
                        </button>
                    </div>
                    <div class="text-center mt-3 text-muted" id="statusTimbang">
                        Sistem dalam keadaan standby. Klik tombol di atas untuk memulai.
                    </div>
                </div>

                <!-- Big Statistics Cards -->
                <div class="row justify-content-center g-4 mb-4">
                    <div class="col-12 col-md-6 col-lg-5">
                        <div class="stat-card" style="padding: 30px;">
                            <div class="stat-icon icon-green" style="width: 80px; height: 80px; font-size: 2.5rem;">
                                <i class="fa-solid fa-weight-scale"></i>
                            </div>
                            <div class="stat-details ms-3">
                                <h5 class="fs-5">Berat Saat Ini</h5>
                                <h3 id="liveWeight" style="font-size: 2.5rem;">0.00 <small class="fs-5 text-muted">kg</small></h3>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-12 col-md-6 col-lg-5">
                        <div class="stat-card" style="padding: 30px;">
                            <div class="stat-icon icon-blue" style="width: 80px; height: 80px; font-size: 2.5rem;">
                                <i class="fa-solid fa-box-archive"></i>
                            </div>
                            <div class="stat-details ms-3">
                                <h5 class="fs-5">Total Berat Hari Ini</h5>
                                <h3 id="totalWeight" style="font-size: 2.5rem;">124.50 <small class="fs-5 text-muted">kg</small></h3>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        function mulaiTimbang(btn) {
            const statusText = document.getElementById('statusTimbang');
            const liveWeight = document.getElementById('liveWeight');
            
            if (btn.classList.contains('btn-primary')) {
                // Ubah ke mode berhenti
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-danger');
                btn.innerHTML = '<i class="fa-solid fa-stop me-2"></i> Hentikan Timbang';
                statusText.innerHTML = '<span class="text-success fw-bold"><i class="fa-solid fa-spinner fa-spin"></i> Sedang membaca data dari sensor...</span>';
                
                // Simulasi pembacaan naik
                liveWeight.innerHTML = '2.95 <small class="fs-5 text-muted">kg</small>';
            } else {
                // Kembali ke mode mulai
                btn.classList.remove('btn-danger');
                btn.classList.add('btn-primary');
                btn.innerHTML = '<i class="fa-solid fa-play me-2"></i> Mulai Timbang';
                statusText.innerHTML = 'Sistem dalam keadaan standby. Klik tombol di atas untuk memulai.';
                
                // Simulasi reset/tersimpan
                alert('Data penimbangan sebesar 2.95 kg berhasil disimpan ke riwayat!');
                liveWeight.innerHTML = '0.00 <small class="fs-5 text-muted">kg</small>';
                
                // Update total berat simulasi
                document.getElementById('totalWeight').innerHTML = '127.45 <small class="fs-5 text-muted">kg</small>';
            }
        }
    </script>
</body>
</html>
